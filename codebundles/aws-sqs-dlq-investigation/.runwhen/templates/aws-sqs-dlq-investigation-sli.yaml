apiVersion: runwhen.com/v1
kind: ServiceLevelIndicator
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  displayUnitsLong: OK
  displayUnitsShort: ok
  locations:
    - {{default_location}}
  description: Measures whether the primary SQS queue and its DLQ pass the redrive/DLQ depth check (1 = no issues).
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/aws-sqs-dlq-investigation/sli.robot
  intervalStrategy: intermezzo
  intervalSeconds: 180
  configProvided:
    - name: AWS_REGION
      value: "{{ match_resource.resource.region }}"
    - name: AWS_ACCOUNT_NAME
      value: "{{ match_resource.account_name }}"
    - name: SQS_QUEUE_URLS
      value: "{{ match_resource.resource.url | default('') }}"
    - name: RESOURCES
      value: "{{ match_resource.resource.name }}"
    - name: DLQ_DEPTH_THRESHOLD
      value: "{{ custom.dlq_depth_threshold | default('0') }}"
  secretsProvided:
    {% include "aws-auth.yaml" ignore missing %}
  alertConfig:
    tasks:
      persona: eager-edgar
      sessionTTL: 10m
