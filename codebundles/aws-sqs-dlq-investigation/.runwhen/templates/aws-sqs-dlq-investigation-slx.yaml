apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/aws/Architecture-Group-Icons_06072024/AWS-Cloud-logo_32.png
  alias: "{{ match_resource.account_name }} SQS DLQ Investigation"
  asMeasuredBy: "Dead-letter backlog and redrive configuration for SQS queues in {{ match_resource.resource.region }}."
  configProvided:
    - name: SLX_PLACEHOLDER
      value: SLX_PLACEHOLDER
  owners:
    - {{ workspace.owner_email }}
  statement: Primary queue should have a configured DLQ with acceptable backlog and healthy downstream processing.
  additionalContext:
    {% include "aws-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name | replace(':', '_') }}"
  tags:
    {% include "aws-tags.yaml" ignore missing %}
    - name: cloud
      value: aws
    - name: service
      value: sqs
    - name: scope
      value: region
    - name: access
      value: read-only
