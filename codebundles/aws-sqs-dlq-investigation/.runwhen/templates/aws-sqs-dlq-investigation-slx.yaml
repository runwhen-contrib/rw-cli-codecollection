apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/aws/aws.png
  alias: "{{ match_resource.account_name | default('AWS') }} SQS DLQ — {{ match_resource.name | default(match_resource.resource.name) }}"
  asMeasuredBy: "Dead-letter backlog, DLQ age, and correlated consumer logs for the scoped SQS queue."
  configProvided:
    - name: SLX_PLACEHOLDER
      value: SLX_PLACEHOLDER
  owners:
    - {{ workspace.owner_email }}
  statement: Messages should not accumulate in the dead-letter queue without investigation.
  additionalContext:
    {% include "aws-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name | replace(':', '_') }}"
  tags:
    {% include "aws-tags.yaml" ignore missing %}
    - name: cloud
      value: aws
    - name: service
      value: sqs
    - name: scope
      value: resource
    - name: access
      value: read-only
