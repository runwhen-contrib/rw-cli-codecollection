apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: Investigates SQS dead-letter queues with configuration, metrics, Lambda mappings, and CloudWatch logs.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/aws-sqs-dlq-investigation/runbook.robot
  configProvided:
    - name: AWS_REGION
      value: "{{ match_resource.resource.region | default(match_resource.region) }}"
    - name: AWS_ACCOUNT_NAME
      value: "{{ match_resource.account_name | default('Unknown') }}"
    - name: SQS_QUEUE_NAME
      value: "{{ match_resource.name | default(match_resource.resource.name) }}"
    - name: SQS_QUEUE_URL
      value: "{{ match_resource.resource.queue_url | default('') }}"
    - name: CLOUDWATCH_LOG_GROUPS
      value: "{{ custom.cloudwatch_log_groups | default('') }}"
    - name: LOG_LOOKBACK_MINUTES
      value: "{{ custom.log_lookback_minutes | default('120') }}"
    - name: DLQ_DEPTH_THRESHOLD
      value: "{{ custom.dlq_depth_threshold | default('0') }}"
    - name: TIMEOUT_SECONDS
      value: "{{ custom.timeout_seconds | default('240') }}"
    - name: QUERY_TIMEOUT_SECONDS
      value: "{{ custom.query_timeout_seconds | default('300') }}"
  secretsProvided:
    {% include "aws-auth.yaml" ignore missing %}
