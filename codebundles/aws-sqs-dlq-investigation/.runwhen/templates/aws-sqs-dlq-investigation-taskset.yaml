apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: Investigates SQS dead-letter queues, Lambda consumers, and CloudWatch logs for a primary queue.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/aws-sqs-dlq-investigation/runbook.robot
  configProvided:
    - name: AWS_REGION
      value: "{{ match_resource.resource.region }}"
    - name: AWS_ACCOUNT_NAME
      value: "{{ match_resource.account_name }}"
    - name: SQS_QUEUE_URLS
      value: ""
    - name: RESOURCES
      value: "{{ match_resource.resource.name }}"
    - name: DLQ_DEPTH_THRESHOLD
      value: "{{ custom.dlq_depth_threshold | default('0') }}"
    - name: CLOUDWATCH_LOG_LOOKBACK_MINUTES
      value: "{{ custom.cloudwatch_log_lookback_minutes | default('60') }}"
    - name: EXTRA_LOG_GROUP_NAMES
      value: "{{ custom.extra_log_group_names | default('') }}"
    - name: MAX_DLQ_SAMPLE_MESSAGES
      value: "{{ custom.max_dlq_sample_messages | default('5') }}"
  secretsProvided:
    {% include "aws-auth.yaml" ignore missing %}
