apiVersion: runwhen.com/v1
kind: CodeBundle
metadata:
  name: azure-devops-organization-health
  title: "Azure DevOps Organization Health"
  description: "Comprehensive organization-level health monitoring for Azure DevOps platform and shared resources"
  author: "RunWhen"
  documentationURL: "https://docs.runwhen.com/public/v/codebundles/azure-devops-organization-health"
  tags:
    - azure
    - devops
    - organization
    - platform
    - health
    - sli
    - monitoring
    - capacity
    - compliance
    - licensing
spec:
  platform: linux
  requires:
    - curl
    - jq
    - bc
  supportedLocations:
    - azure
    - kubernetes
    - local
  codeBundle:
    repoURL: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    ref: main
    pathToRobot: codebundles/azure-devops-organization-health/runbook.robot
  parameters:
    - name: AZURE_DEVOPS_ORG
      description: "Azure DevOps organization name"
      required: true
      example: "myorganization"
    - name: AZURE_RESOURCE_GROUP  
      description: "Azure resource group for the organization"
      required: true
      example: "rg-devops-prod"
    - name: AGENT_UTILIZATION_THRESHOLD
      description: "Agent pool utilization threshold percentage (0-100) above which capacity issues are flagged"
      required: false
      default: "80"
      example: "85"
    - name: LICENSE_UTILIZATION_THRESHOLD
      description: "License utilization threshold percentage (0-100) above which licensing issues are flagged"
      required: false
      default: "90"
      example: "95"
    - name: EPHEMERAL_OFFLINE_RATIO
      description: "Percentage of offline agents above which a pool that still has online capacity is treated as an elastic/ephemeral (VMSS/AKS/container) pool, so transient offline agents are not flagged as outages"
      required: false
      default: "60"
      example: "70"
    - name: AGENT_FETCH_PARALLELISM
      description: "Number of agent-pool agent lists to fetch concurrently (performance tuning for organizations with many pools). Clamped to 1-32; agents are fetched via REST to avoid per-pool CLI startup cost."
      required: false
      default: "20"
      example: "24"
    - name: USER_PAGE_SIZE
      description: "Page size used when paginating organization users for licensing/policy analysis (max 10000)"
      required: false
      default: "1000"
      example: "5000"
    - name: MAX_OFFLINE_DETAIL
      description: "Maximum number of offline agent names enumerated per pool in issue details (prevents oversized reports for pools with many stale agents)"
      required: false
      default: "20"
      example: "50"
    - name: RW_LOOKBACK_WINDOW
      description: "Lookback window for time-windowed organization analyses. Format: 24h, 7d, 30d. Point-in-time signals (agent pool capacity, platform incidents) ignore it."
      required: false
      default: "24h"
      example: "30d"
    - name: MAX_PROJECTS
      description: "Maximum number of projects scanned for cross-project dependency analysis. Bounds runtime on large organizations (the analysis makes a single bounded pass over projects rather than a pools x projects nested loop)."
      required: false
      default: "25"
      example: "50"
    - name: QUEUE_AGING_THRESHOLD_MIN
      description: "SLI only. Minutes a build (notStarted job request) may wait in a self-hosted pool's queue before the pool_capacity_ok sub-score drops to 0. Queue-derived so a scaled-to-zero elastic/ephemeral pool with no aging queue is NOT penalised (consistent with the agent-pool fix)."
      required: false
      default: "30"
      example: "15"
    - name: ORG_POOL_PROBE_LIMIT
      description: "SLI only. Maximum number of self-hosted pools whose job-request queue is probed per hourly SLI run. Bounds the probe so it stays cheap on organizations with hundreds of pools; the deep daily runbook covers the full 473-pool scan."
      required: false
      default: "150"
      example: "300"
  secrets:
    - name: azure_credentials
      description: "Azure service principal credentials for authentication"
      required: true
      keys:
        - AZURE_CLIENT_ID
        - AZURE_TENANT_ID
        - AZURE_CLIENT_SECRET
        - AZURE_SUBSCRIPTION_ID
  sli:
    enabled: true
    type: "availability"
    objective: 0.95
    description: "Organization health score should be above 70/100"
    query: |
      # Organization health is considered healthy when:
      # - Service connectivity is working
      # - Agent pools have adequate capacity
      # - No critical security/compliance issues
      # - License utilization is within acceptable limits
      # Health score >= 70 indicates good organizational health
    errorQuery: |
      # Organization health issues include:
      # - Service connectivity problems
      # - Agent pool capacity issues
      # - Security/compliance violations
      # - License utilization problems
      # - Platform-wide service issues
  troubleshooting:
    - name: "Required Azure DevOps Access"
      description: "PAT scopes and Azure DevOps roles the monitoring identity needs. The preflight access check (run at suite start, see 'Preflight Access Check' in the report) probes each of these and names the exact missing scope/role."
      steps:
        - "Projects (core): PAT scope 'Project and Team (Read)' (vso.project); role: Project Reader"
        - "Agent Pools (core): PAT scope 'Agent Pools (Read)' (vso.agentpools); role: Reader on Organization Settings > Agent pools"
        - "Licensing / User Entitlements: PAT scope 'Member Entitlement Management (Read)' (vso.memberentitlementmanagement); role: Project Collection Administrator"
        - "Security Groups: PAT scope 'Graph (Read)' (vso.graph); role: Project Collection Administrator"
        - "Service Connections: PAT scope 'Service Connections (Read)' (vso.serviceendpoint); role: Reader on the service connection"
        - "If the preflight reports INSUFFICIENT ACCESS, grant the listed scopes/roles and re-run; affected tasks return empty/partial results until then"
    - name: "Account for Elastic / VMSS Agent Pools"
      description: "Why offline agent counts may look high and how the tasks handle it"
      steps:
        - "Elastic (VMSS/scale-set) and self-managed ephemeral (AKS/container) pools constantly create and tear down agents, leaving many 'offline' registrations that are NOT failures"
        - "Tasks detect these pools (via the elastic pools API and pool metadata such as agentCloudId/targetSize, plus an online-with-high-offline-ratio heuristic) and exclude expected offline churn from issue reporting"
        - "For these pools the actionable signal is having zero ONLINE agents; tune EPHEMERAL_OFFLINE_RATIO if a self-managed pool is mis-classified"
        - "Optionally configure Azure DevOps to automatically remove torn-down agents to reduce the offline backlog"
    - name: "Check Azure DevOps Service Status"
      description: "Verify Azure DevOps service availability and performance"
      steps:
        - "Visit https://status.dev.azure.com for service status"
        - "Test organization URL accessibility"
        - "Check API endpoint response times"
    - name: "Review Agent Pool Capacity"
      description: "Analyze agent pool utilization and capacity issues"
      steps:
        - "Check agent pool utilization metrics"
        - "Identify offline or unavailable agents"
        - "Review agent distribution across projects"
        - "Consider scaling agent pools if utilization is high"
    - name: "Verify Organization Policies"
      description: "Review security policies and compliance settings"
      steps:
        - "Check organization security group configurations"
        - "Review project visibility settings"
        - "Verify branch protection policies"
        - "Audit service connection security"
    - name: "Optimize License Utilization"
      description: "Review and optimize license allocation"
      steps:
        - "Identify inactive users for license reclamation"
        - "Review user access level assignments"
        - "Consider stakeholder licenses for view-only users"
        - "Audit Visual Studio subscriber usage"
    - name: "Investigate Platform Issues"
      description: "Deep dive into platform-wide problems"
      steps:
        - "Check for service incidents or outages"
        - "Analyze failure patterns across projects"
        - "Review API performance and rate limiting"
        - "Verify authentication and connectivity" 