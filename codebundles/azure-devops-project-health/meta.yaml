apiVersion: runwhen.com/v1
kind: CodeBundle
metadata:
  name: azure-devops-project-health
  title: "Azure DevOps Project Health"
  description: "Comprehensive Azure DevOps project health monitoring including pipeline failures, performance analysis, agent pools, service connections, repository policies, and commit correlation for identifying what changed"
  author: "RunWhen"
  documentationURL: "https://docs.runwhen.com/public/v/codebundles/azure-devops-project-health"
  tags:
    - azure
    - devops
    - project
    - pipelines
    - health
    - sli
    - monitoring
    - agent-pools
    - service-connections
    - commits
spec:
  platform: linux
  requires:
    - curl
    - jq
    - bc
  supportedLocations:
    - azure
    - kubernetes
    - local
  codeBundle:
    repoURL: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    ref: main
    pathToRobot: codebundles/azure-devops-project-health/runbook.robot
  parameters:
    - name: AZURE_DEVOPS_ORG
      description: "Azure DevOps organization name"
      required: true
      example: "myorganization"
    - name: AZURE_DEVOPS_PROJECTS
      description: "Comma-separated list of Azure DevOps projects to monitor (e.g., 'project1,project2') or 'All' to monitor all projects"
      required: true
      default: "All"
      example: "MyProject,AnotherProject"
    - name: DURATION_THRESHOLD
      description: "Threshold for long-running pipelines (format: 60m, 2h)"
      required: false
      default: "60m"
      example: "2h"
    - name: QUEUE_THRESHOLD
      description: "Threshold for queued pipelines (format: 10m, 1h)"
      required: false
      default: "30m"
      example: "1h"
    - name: RW_LOOKBACK_WINDOW
      description: "Runbook: set via taskset configProvided (24h) for the single-pass build dataset. SLI: injected by the platform from intervalSeconds as seconds (do not put RW_LOOKBACK_WINDOW in the SLI template); sli.robot imports it with Import Platform Variable and formats via Normalize Lookback Window (format 2). Point-in-time SLI signals (queue, long-running) ignore it."
      required: false
      default: "24h"
      example: "30d"
    - name: MAX_FAILURES_TO_INVESTIGATE
      description: "Maximum number of failed builds whose logs/commits are deep-investigated per task (the only genuine per-item work left after the single-pass refactor). Most-recent failures first."
      required: false
      default: "10"
      example: "25"
    - name: MAX_REPOS
      description: "Maximum number of repositories whose commit history is fetched in repository activity analysis (bounds per-repo work; PR and policy data are fetched project-wide in a single call regardless)."
      required: false
      default: "50"
      example: "100"
    - name: EPHEMERAL_OFFLINE_RATIO
      description: "Percentage of offline agents above which a pool that still has online capacity is treated as an elastic/ephemeral (VMSS/AKS/container) pool, so transient offline agents are not flagged as outages"
      required: false
      default: "60"
      example: "70"
    - name: AGENT_FETCH_PARALLELISM
      description: "Number of agent-pool agent lists to fetch concurrently (performance tuning for organizations with many pools). Clamped to 1-32; agents are fetched via REST to avoid per-pool CLI startup cost."
      required: false
      default: "20"
      example: "24"
    - name: SLI_MAX_FAILURE_RATIO
      description: "SLI only. Maximum failed/total completed-build ratio within the platform-injected SLI window before pipeline_failure_ratio_ok drops to 0. A window with 0 completed runs scores 1 (cannot measure = healthy)."
      required: false
      default: "0.50"
      example: "0.30"
    - name: SLI_MAX_LONGRUNNING
      description: "SLI only. Maximum number of in-flight builds older than DURATION_THRESHOLD allowed before the long_running_ok sub-score drops to 0 (point-in-time)."
      required: false
      default: "1"
      example: "2"
    - name: SLI_PROTECTED_BRANCH_PATTERN
      description: "SLI only. Regex matching protected source branches. The protected_branch_failures_ok sub-score drops to 0 only when a pipeline on one of these branches fails 100% of its runs within the SLI window (chronic flaky PR/scheduled pipelines are kept report-only in the runbook, not scored)."
      required: false
      default: "^refs/heads/(main|master|develop|release/)"
      example: "^refs/heads/(main|release/)"
  secrets:
    - name: azure_credentials
      description: "Azure service principal credentials for authentication"
      required: true
      keys:
        - AZURE_CLIENT_ID
        - AZURE_TENANT_ID
        - AZURE_CLIENT_SECRET
        - AZURE_SUBSCRIPTION_ID
  sli:
    enabled: true
    type: "availability"
    objective: 0.95
    description: "Project health score should be above 70/100"
    query: |
      # Project health is considered healthy when:
      # - Pipelines are succeeding consistently
      # - Agent pools have available agents
      # - Service connections are ready
      # - Repository policies are properly configured
      # Health score >= 70 indicates good project health
    errorQuery: |
      # Project health issues include:
      # - Pipeline failures or long-running pipelines
      # - Agent pool capacity issues
      # - Service connection failures
      # - Missing or misconfigured branch policies
  troubleshooting:
    - name: "Required Azure DevOps Access"
      description: "PAT scopes and Azure DevOps roles the monitoring identity needs. The preflight access check (run at suite start, see 'Preflight Access Check' in the report) probes each of these and names the exact missing scope/role."
      steps:
        - "Projects: PAT scope 'Project and Team (Read)' (vso.project); role: member of Project Valid Users / Project Reader"
        - "Pipelines & Builds: PAT scope 'Build (Read)' (vso.build); role: Build Reader (Readers group)"
        - "Repositories: PAT scope 'Code (Read)' (vso.code); role: Reader/Contributor on the project's repositories"
        - "Agent Pools: PAT scope 'Agent Pools (Read)' (vso.agentpools); role: Reader on Organization Settings > Agent pools"
        - "Service Connections: PAT scope 'Service Connections (Read)' (vso.serviceendpoint); role: Reader on the service connection"
        - "If the preflight reports INSUFFICIENT ACCESS, grant the listed scopes/roles and re-run; affected tasks return empty/partial results until then"
    - name: "Investigate Pipeline Failures"
      description: "Analyze failed pipelines and correlate with recent commits"
      steps:
        - "Review failed pipeline logs for error messages"
        - "Check recent commits on the failing branch for breaking changes"
        - "Verify service connections and build agent availability"
        - "Compare with last successful pipeline run"
    - name: "Resolve Agent Pool Issues"
      description: "Address agent pool capacity and availability problems"
      steps:
        - "Check agent machine connectivity and status"
        - "Restart offline agent services"
        - "Scale agent pools if utilization is consistently high"
        - "Review agent pool permissions and assignments"
    - name: "Fix Service Connection Problems"
      description: "Troubleshoot unhealthy service connections"
      steps:
        - "Verify service connection credentials are not expired"
        - "Test connectivity to the target service endpoint"
        - "Refresh or recreate the service connection"
        - "Check if required permissions are still granted"
    - name: "Address Repository Policy Gaps"
      description: "Configure missing or weak branch protection policies"
      steps:
        - "Enable required reviewers for default branches"
        - "Add build validation policies"
        - "Configure work item linking requirements"
        - "Lock default branches to prevent direct pushes"
