apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/azure/networking/10062-icon-service-Load-Balancers.svg
  alias: {{ match_resource.resource_name }} Azure NSG and Firewall Activity Audit
  asMeasuredBy: Activity log review of NSG and Azure Firewall mutations with caller classification against CI/CD allowlists.
  configProvided:
    - name: SLX_PLACEHOLDER
      value: SLX_PLACEHOLDER
  owners:
    - {{ workspace.owner_email }}
  statement: >-
    Network security changes should be traceable to approved automation or
    authorized maintenance; unexpected manual mutations should be reviewed.
  additionalContext:
    {% include "azure-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "azure-tags.yaml" ignore missing %}
    - name: cloud
      value: azure
    - name: service
      value: network-security
    - name: scope
      value: subscription
    - name: access
      value: read-only
