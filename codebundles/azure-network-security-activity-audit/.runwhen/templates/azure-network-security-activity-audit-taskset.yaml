apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: >-
    Audit Azure Activity Log for NSG and Azure Firewall / policy changes in
    subscription {{ match_resource.subscription_id | default("unknown") }}; classify callers
    against CI/CD allowlists and optional maintenance windows.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/azure-network-security-activity-audit/runbook.robot
  configProvided:
    - name: AZURE_SUBSCRIPTION_ID
      value: "{{ match_resource.subscription_id }}"
    - name: AZURE_RESOURCE_GROUP
      value: "{{ match_resource.resource_group.name | default('') }}"
    - name: ACTIVITY_LOOKBACK_HOURS
      value: "168"
    - name: CICD_APP_IDS
      value: ""
    - name: CICD_OBJECT_IDS
      value: ""
    - name: ACTIVITY_LOG_MAX_EVENTS
      value: "500"
    - name: MAINTENANCE_START_HOUR_UTC
      value: ""
    - name: MAINTENANCE_END_HOUR_UTC
      value: ""
    - name: TIMEOUT_SECONDS
      value: "240"
  secretsProvided:
  {% if wb_version %}
    {% include "azure-auth.yaml" ignore missing %}
  {% else %}
    - name: azure_credentials
      workspaceKey: AUTH DETAILS NOT FOUND
  {% endif %}
