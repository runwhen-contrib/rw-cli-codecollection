apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/azure/networking/10062-icon-service-Virtual-Networks.svg
  alias: >-
    {{ match_resource.resource_group.name }} NSG {{ match_resource.name }} Drift
  asMeasuredBy: Drift between live NSG rules and a declared baseline JSON.
  configProvided:
    - name: SLX_PLACEHOLDER
      value: SLX_PLACEHOLDER
  owners:
    - {{ workspace.owner_email }}
  statement: >-
    Detect out-of-band NSG rule and association changes by comparing Azure live
    state to a repo-managed baseline for NSG {{ match_resource.name }} in
    resource group {{ match_resource.resource_group.name }}.
  additionalContext:
    {% include "azure-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "azure-tags.yaml" ignore missing %}
    - name: cloud
      value: azure
    - name: service
      value: network-security-group
    - name: scope
      value: resource-group
    - name: access
      value: read-only
