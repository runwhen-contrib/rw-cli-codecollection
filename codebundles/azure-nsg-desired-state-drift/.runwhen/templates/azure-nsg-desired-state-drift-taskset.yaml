apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: >-
    Compare live Azure NSG rules and subnet/NIC associations against a baseline
    JSON for subscription {{ subscription_name }}, resource group
    {{ match_resource.resource_group.name }}, NSG {{ match_resource.name }}.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/azure-nsg-desired-state-drift/runbook.robot
  configProvided:
    - name: AZURE_SUBSCRIPTION_ID
      value: "{{ subscription_id }}"
    - name: AZURE_RESOURCE_GROUP
      value: "{{ match_resource.resource_group.name }}"
    - name: NSG_NAME
      value: "{{ match_resource.name }}"
    - name: BASELINE_PATH
      value: "{{ custom.baseline_path | default('REPLACE_WITH_BASELINE_URI_OR_PATH') }}"
    - name: BASELINE_FORMAT
      value: "{{ custom.baseline_format | default('json-bundle') }}"
    - name: IGNORE_RULE_PREFIXES
      value: "{{ custom.ignore_rule_prefixes | default('') }}"
    - name: COMPARE_DEFAULT_RULES
      value: "{{ custom.compare_default_rules | default('false') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "azure-auth.yaml" ignore missing %}
  {% else %}
    - name: azure_credentials
      workspaceKey: AUTH DETAILS NOT FOUND
  {% endif %}
