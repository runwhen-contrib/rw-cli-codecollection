apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/azure/networking/10062-icon-service-Load-Balancers.svg
  alias: {{ match_resource.resource.name }} Azure Subnet Egress Validation
  asMeasuredBy: NSG egress posture, UDR next hop alignment, and optional Network Watcher probes for configured targets.
  configProvided:
    - name: SLX_PLACEHOLDER
      value: SLX_PLACEHOLDER
  owners:
    - {{ workspace.owner_email }}
  statement: Egress from subnets in this virtual network should match NSG, route, and firewall policy before traffic reaches external or shared services.
  additionalContext:
    {% include "azure-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "azure-tags.yaml" ignore missing %}
    - name: cloud
      value: azure
    - name: service
      value: virtual-network
    - name: scope
      value: resource
    - name: access
      value: read-only
