apiVersion: v1
kind: Namespace
metadata:
  name: test-airflow-http-health

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fake-airflow-http
  namespace: test-airflow-http-health
data:
  default.conf: |
    server {
      listen 8080;
      location /health {
        default_type application/json;
        return 200 '{"metadatabase":{"status":"healthy"},"scheduler":{"status":"healthy"},"triggerer":{"status":null},"dag_processor":{"status":null}}';
      }
      location /api/v1/version {
        default_type application/json;
        return 200 '{"version":"2.8.0","git_version":""}';
      }
      location /api/v1/health {
        default_type application/json;
        return 200 '{"metadatabase":{"status":"healthy"}}';
      }
      location /api/v2/monitor/health {
        default_type application/json;
        return 404 '{}';
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-airflow-webserver
  namespace: test-airflow-http-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-airflow-webserver
  template:
    metadata:
      labels:
        app: fake-airflow-webserver
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: cfg
          configMap:
            name: fake-airflow-http

---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: test-airflow-http-health
  labels:
    app.kubernetes.io/name: airflow
spec:
  selector:
    app: fake-airflow-webserver
  ports:
    - port: 8080
      name: http
      protocol: TCP
