apiVersion: runwhen.com/v1
kind: ServiceLevelIndicator
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  displayUnitsLong: OK
  displayUnitsShort: ok
  locations:
    - {{default_location}}
  description: Aggregates failed Jobs, long-running active Jobs, and CronJob reliability into a 0-1 score for the namespace.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/k8s-job-namespace-health/sli.robot
  intervalStrategy: intermezzo
  intervalSeconds: 300
  configProvided:
    - name: NAMESPACE
      value: "{{match_resource.resource.metadata.namespace}}"
    - name: CONTEXT
      value: "{{context}}"
    - name: KUBERNETES_DISTRIBUTION_BINARY
      value: "{{custom.kubernetes_distribution_binary | default('kubectl')}}"
    - name: JOB_ACTIVE_DURATION_WARN_MINUTES
      value: "{{custom.job_active_duration_warn_minutes | default('360')}}"
  secretsProvided:
  {% if wb_version %}
    {% include "kubernetes-auth.yaml" ignore missing %}
  {% else %}
    - name: kubeconfig
      workspaceKey: {{custom.kubeconfig_secret_name | default("kubeconfig")}}
  {% endif %}
  alertConfig:
    tasks:
      persona: eager-edgar
      sessionTTL: 10m
