apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/kubernetes/resources/labeled/job.svg
  alias: {{match_resource.resource.metadata.namespace}} Namespace Job Health
  asMeasuredBy: Batch Job and CronJob completion reliability, schedule health, and related pod events in the namespace.
  configProvided:
    - name: OBJECT_NAME
      value: {{match_resource.resource.metadata.namespace}}
  owners:
    - {{workspace.owner_email}}
  statement: Jobs and CronJobs in this namespace should complete successfully without prolonged failures or scheduling gaps.
  additionalContext:
    {% include "kubernetes-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "kubernetes-tags.yaml" ignore missing %}
    - name: access
      value: read-only
