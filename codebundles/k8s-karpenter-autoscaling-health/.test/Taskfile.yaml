version: "3"

tasks:
  default:
    desc: "Validate generation rules and test manifest"
    cmds:
      - task: check-unpushed-commits
      - task: validate-generation-rules
      - task: validate-shell-scripts

  clean:
    desc: "Remove test namespace objects"
    cmds:
      - task: remove-kubernetes-objects
      - task: clean-rwl-discovery

  build-infra:
    desc: "Apply test Kubernetes manifests"
    cmds:
      - task: create-kubernetes-objects

  create-kubernetes-objects:
    desc: "Apply manifests from kubernetes directory using kubectl"
    cmds:
      - kubectl apply -f kubernetes/manifest.yaml
    silent: true

  remove-kubernetes-objects:
    desc: "Delete kubernetes objects from test manifests"
    cmds:
      - kubectl delete -f kubernetes/manifest.yaml --ignore-not-found=true
    silent: true

  check-unpushed-commits:
    desc: Check for uncommitted changes before local discovery tests
    vars:
      BASE_DIR: "../"
    cmds:
      - |
        UNCOMMITTED=$(git diff --name-only HEAD | grep -E "^${BASE_DIR}" | grep -v "/\.test/" || true)
        if [ -n "$UNCOMMITTED" ]; then
          echo "Uncommitted changes found in ${BASE_DIR}. Commit before run-rwl-discovery."
          exit 1
        fi
    silent: true

  validate-generation-rules:
    desc: "Validate YAML files in .runwhen/generation-rules"
    cmds:
      - |
        for yaml_file in ../.runwhen/generation-rules/*.yaml; do
          python3 -c "import yaml,sys; yaml.safe_load(open(sys.argv[1]))" "$yaml_file" \
            && echo "OK: $yaml_file" || exit 1
        done
    silent: true

  validate-shell-scripts:
    desc: "Syntax-check CodeBundle shell scripts"
    cmds:
      - bash -n ../check-karpenter-nodepool-nodeclaim-status.sh
      - bash -n ../check-pending-provisioning-workloads.sh
      - bash -n ../scan-karpenter-controller-logs.sh
      - bash -n ../check-karpenter-nodeclass-conditions.sh
      - bash -n ../check-stuck-nodeclaims.sh
      - bash -n ../correlate-karpenter-logs-pending-pods.sh
      - bash -n ../sli-karpenter-autoscaling-score.sh
    silent: true

  generate-rwl-config:
    desc: "Generate workspaceInfo.yaml for RunWhen Local (cluster-scoped bundle)"
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
    cmds:
      - |
        repo_url=$(git config --get remote.origin.url)
        branch_name=$(git rev-parse --abbrev-ref HEAD)
        codebundle=$(basename "$(dirname "$PWD")")
        namespace=$(yq e 'select(.kind == "Namespace") | .metadata.name' kubernetes/manifest.yaml -N)
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: none
        cloudConfig:
          kubernetes:
            kubeconfigFile: /shared/kubeconfig
            namespaceLODs:
              $namespace: detailed
            namespaces:
              - $namespace
        codeCollections:
        - repoURL: "$repo_url"
          branch: "$branch_name"
          codeBundles: ["$codebundle"]
        custom:
          kubeconfig_secret_name: "kubeconfig"
          kubernetes_distribution_binary: kubectl
          karpenter_namespace: "karpenter"
        EOF
    silent: true

  run-rwl-discovery:
    desc: "Run RunWhen Local Discovery (requires Docker and kubeconfig)"
    cmds:
      - echo "See docs/skills/test-infra-kubernetes.md for RunWhen Local container setup."
    silent: true

  clean-rwl-discovery:
    desc: "Remove discovery output"
    cmds:
      - rm -rf output workspaceInfo.yaml
    silent: true
