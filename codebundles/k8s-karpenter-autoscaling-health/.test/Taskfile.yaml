version: "3"

# ---------------------------------------------------------------------------
# Self-contained test harness for the k8s-karpenter-autoscaling-health
# CodeBundle. Uses an ephemeral Kind cluster, standalone KWOK for fake
# Node objects, and vendored Karpenter + AWS EC2NodeClass CRDs. No real
# Karpenter controller (and therefore no AWS, EKS, or container-build
# dependency) - fixtures drive cluster state directly via kubectl.
#
# Typical flow:
#   task build-infra   # kind-up + install
#   task test-all      # every scenario against the running cluster
#   task clean         # kind-down
#
# Or just run everything end-to-end:
#   task default
# ---------------------------------------------------------------------------

vars:
  CLUSTER_NAME: kp-as-health-test
  CONTEXT: kind-{{.CLUSTER_NAME}}
  KARPENTER_NAMESPACE: karpenter
  KWOK_VERSION: v0.7.0

tasks:
  default:
    desc: "End-to-end: create cluster, install, run all scenarios, tear down"
    cmds:
      - task: build-infra
      - task: test-all
      - task: clean

  # ------------------------------------------------------------------------
  # Cluster lifecycle
  # ------------------------------------------------------------------------
  kind-up:
    desc: "Create the ephemeral Kind cluster (no-op if it already exists)"
    cmds:
      - bash scripts/kind-up.sh "{{.CLUSTER_NAME}}"

  kind-down:
    desc: "Delete the ephemeral Kind cluster"
    cmds:
      - bash scripts/kind-down.sh "{{.CLUSTER_NAME}}"

  install:
    desc: "Install KWOK, Karpenter + AWS CRDs, and fake-karpenter baseline"
    cmds:
      - bash scripts/install.sh "{{.CONTEXT}}" "{{.KWOK_VERSION}}"

  build-infra:
    desc: "kind-up + install"
    cmds:
      - task: kind-up
      - task: install

  clean:
    desc: "Tear down the cluster and remove local scenario output"
    cmds:
      - task: kind-down
      - rm -rf output

  # ------------------------------------------------------------------------
  # Scenarios - each starts from a healthy baseline, applies its fixture,
  # runs the relevant bundle script(s), asserts expected issues, cleans up.
  # ------------------------------------------------------------------------
  test-healthy:
    desc: "Baseline: every check emits zero issues"
    cmds:
      - bash scripts/run-scenario.sh healthy "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-nodepool-unhealthy:
    desc: "NodePool with Ready=False condition is flagged"
    cmds:
      - bash scripts/run-scenario.sh nodepool-unhealthy "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-nodeclaim-not-registered:
    desc: "NodeClaim with Registered=False condition is flagged"
    cmds:
      - bash scripts/run-scenario.sh nodeclaim-not-registered "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-node-not-ready:
    desc: "Node with Ready=False condition is flagged"
    cmds:
      - bash scripts/run-scenario.sh node-not-ready "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-node-cordoned:
    desc: "Cordoned node (spec.unschedulable=true) is flagged"
    cmds:
      - bash scripts/run-scenario.sh node-cordoned "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-pending-pod:
    desc: "Pending pod with capacity/scheduling messages is flagged"
    cmds:
      - bash scripts/run-scenario.sh pending-pod "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-stuck-nodeclaim:
    desc: "NodeClaim older than threshold without Ready=True is flagged"
    cmds:
      - bash scripts/run-scenario.sh stuck-nodeclaim "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-stuck-nodeclaim-deleting:
    desc: "NodeClaim retained via finalizer after delete is flagged"
    cmds:
      - bash scripts/run-scenario.sh stuck-nodeclaim-deleting "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-ec2nodeclass-degraded:
    desc: "EC2NodeClass with Ready=False condition is flagged"
    cmds:
      - bash scripts/run-scenario.sh ec2nodeclass-degraded "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-controller-logs-errors:
    desc: "Controller logs containing AWS-shaped errors are flagged"
    cmds:
      - bash scripts/run-scenario.sh controller-logs-errors "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-log-correlation:
    desc: "Pending pod name referenced in controller error logs is flagged"
    cmds:
      - bash scripts/run-scenario.sh log-correlation "{{.CONTEXT}}" "{{.KARPENTER_NAMESPACE}}"

  test-all:
    desc: "Run every scenario sequentially"
    cmds:
      - task: test-healthy
      - task: test-nodepool-unhealthy
      - task: test-nodeclaim-not-registered
      - task: test-node-not-ready
      - task: test-node-cordoned
      - task: test-pending-pod
      - task: test-stuck-nodeclaim
      - task: test-stuck-nodeclaim-deleting
      - task: test-ec2nodeclass-degraded
      - task: test-controller-logs-errors
      - task: test-log-correlation

  # ------------------------------------------------------------------------
  # Static checks (no cluster required)
  # ------------------------------------------------------------------------
  validate-shell-scripts:
    desc: "Syntax-check CodeBundle shell scripts"
    cmds:
      - bash -n ../check-karpenter-nodepool-nodeclaim-status.sh
      - bash -n ../check-pending-provisioning-workloads.sh
      - bash -n ../scan-karpenter-controller-logs.sh
      - bash -n ../check-karpenter-nodeclass-conditions.sh
      - bash -n ../check-stuck-nodeclaims.sh
      - bash -n ../correlate-karpenter-logs-pending-pods.sh
      - bash -n ../sli-karpenter-autoscaling-score.sh
    silent: true

  validate-generation-rules:
    desc: "Validate YAML files in .runwhen/generation-rules"
    cmds:
      - |
        for yaml_file in ../.runwhen/generation-rules/*.yaml; do
          python3 -c "import yaml,sys; yaml.safe_load(open(sys.argv[1]))" "$yaml_file" \
            && echo "OK: $yaml_file" || exit 1
        done
    silent: true

  # ------------------------------------------------------------------------
  # RunWhen Local discovery flow (cluster-scoped codebundle)
  # ------------------------------------------------------------------------
  generate-rwl-config:
    desc: "Generate RunWhen Local configuration (workspaceInfo.yaml)"
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
    cmds:
      - |
        repo_url=$(git config --get remote.origin.url)
        branch_name=$(git rev-parse --abbrev-ref HEAD)
        codebundle=$(basename "$(dirname "$PWD")")
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: none
        cloudConfig:
          kubernetes:
            kubeconfigFile: /shared/kubeconfig
            namespaceLODs:
              {{.KARPENTER_NAMESPACE}}: detailed
            namespaces:
              - {{.KARPENTER_NAMESPACE}}
        codeCollections:
        - repoURL: "$repo_url"
          branch: "$branch_name"
          codeBundles: ["$codebundle"]
        custom:
          kubeconfig_secret_name: "kubeconfig"
          kubernetes_distribution_binary: kubectl
          karpenter_namespace: "{{.KARPENTER_NAMESPACE}}"
        EOF
    silent: true

  clean-rwl-discovery:
    desc: "Remove RunWhen Local discovery output"
    cmds:
      - rm -rf output workspaceInfo.yaml
