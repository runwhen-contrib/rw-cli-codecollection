---
# Pending pod whose name (myapp-pending-abc) we expect to appear in the
# controller log fixture below. Scheduling is blocked by a huge cpu request.
apiVersion: v1
kind: Pod
metadata:
  name: myapp-pending-abc
  namespace: default
  labels:
    test.runwhen.com/fixture: log-correlation
spec:
  nodeSelector:
    runwhen.com/never-matches: "true"
  containers:
    - name: app
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "50"
---
# Karpenter pod whose logs mention the pending pod's name inside an ERROR
# line - exactly what correlate-karpenter-logs-pending-pods.sh looks for.
apiVersion: v1
kind: Pod
metadata:
  name: karpenter-correlating
  namespace: karpenter
  labels:
    app.kubernetes.io/name: karpenter
    app.kubernetes.io/instance: karpenter
    test.runwhen.com/fixture: log-correlation
spec:
  restartPolicy: Always
  containers:
    - name: controller
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            echo "ERROR could not launch node for pending pod myapp-pending-abc: no matching instance type"
            sleep 5
          done
