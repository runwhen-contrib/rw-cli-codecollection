apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/kubernetes-icon-color.svg
  alias: {{ cluster.name }} Karpenter Control Plane Health
  asMeasuredBy: Karpenter controller readiness, webhooks, warning events, CRDs, and metrics Service wiring.
  configProvided:
    - name: OBJECT_NAME
      value: {{ cluster.name }}
  owners:
    - {{ workspace.owner_email }}
  statement: Karpenter controller components in {{ cluster.context }} should be Ready, webhooks should be configured, and observability endpoints should exist.
  additionalContext:
    {% include "kubernetes-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "kubernetes-tags.yaml" ignore missing %}
    - name: access
      value: read-only
