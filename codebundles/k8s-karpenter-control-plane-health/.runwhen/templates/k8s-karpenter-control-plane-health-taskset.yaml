apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: Monitors Karpenter control plane health for the cluster context.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/k8s-karpenter-control-plane-health/runbook.robot
  configProvided:
    - name: CONTEXT
      value: "{{cluster.context}}"
    - name: KARPENTER_NAMESPACE
      value: "{{ custom.karpenter_namespace | default('karpenter') }}"
    - name: KUBERNETES_DISTRIBUTION_BINARY
      value: "{{ custom.kubernetes_distribution_binary | default('kubectl') }}"
    - name: RW_LOOKBACK_WINDOW
      value: "{{ custom.karpenter_lookback_window | default('30m') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "kubernetes-auth.yaml" ignore missing %}
  {% else %}
    - name: kubeconfig
      workspaceKey: {{ custom.kubeconfig_secret_name | default("kubeconfig") }}
  {% endif %}
