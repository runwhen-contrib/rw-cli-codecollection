---
# ---------------------------------------------------------------------------
# Fake Karpenter controller workload used by the test harness.
#
# The CodeBundle scripts only read API objects (Deployments, Pods, Services,
# Endpoints, Webhook configs, Events) via kubectl. They do not talk to AWS or
# require a real Karpenter reconciler. This Deployment looks identical to a
# real Karpenter install from the outside: same labels, a Service named
# "karpenter" with a metrics port, and a container that produces deterministic
# log lines. Scenarios override or augment this baseline.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter
  namespace: karpenter
  labels:
    app.kubernetes.io/name: karpenter
    app.kubernetes.io/instance: karpenter
    test.runwhen.com/fixture: base
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter
      app.kubernetes.io/instance: karpenter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karpenter
        app.kubernetes.io/instance: karpenter
    spec:
      containers:
        - name: controller
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /www && echo ok >/www/index.html
              (while true; do
                 echo "INFO controller heartbeat"
                 sleep 10
               done) &
              exec busybox httpd -f -p 8080 -h /www
          ports:
            - name: http-metrics
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: karpenter
  namespace: karpenter
  labels:
    app.kubernetes.io/name: karpenter
    test.runwhen.com/fixture: base
spec:
  selector:
    app.kubernetes.io/name: karpenter
    app.kubernetes.io/instance: karpenter
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-metrics
