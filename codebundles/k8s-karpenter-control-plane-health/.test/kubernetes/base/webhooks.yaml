---
# Healthy webhook baseline. caBundle is a placeholder non-empty base64 string
# (base64("test-ca")) — the CodeBundle only checks whether caBundle is empty;
# it does not verify the certificate chain.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validation.webhook.karpenter.sh
  labels:
    test.runwhen.com/fixture: base
webhooks:
  - name: validation.karpenter.sh
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: karpenter
        namespace: karpenter
        path: /validate
        port: 8080
      caBundle: dGVzdC1jYQ==
    rules:
      - apiGroups: ["karpenter.sh"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["nodepools"]
        scope: Cluster
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: defaulting.webhook.karpenter.sh
  labels:
    test.runwhen.com/fixture: base
webhooks:
  - name: defaulting.karpenter.sh
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: karpenter
        namespace: karpenter
        path: /mutate
        port: 8080
      caBundle: dGVzdC1jYQ==
    rules:
      - apiGroups: ["karpenter.sh"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["nodepools"]
        scope: Cluster
