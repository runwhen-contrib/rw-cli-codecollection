---
# Two additional dummy CRDs whose spec.group matches /karpenter/i. Combined
# with the vendored karpenter.sh NodePool CRD, this pushes the group count
# above 2 and triggers the "Multiple Karpenter-related CRD groups installed"
# informational finding in check-karpenter-crds.sh.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dummies.karpenter.legacy.example.com
  labels:
    test.runwhen.com/fixture: extra-crd-groups
spec:
  group: karpenter.legacy.example.com
  names:
    kind: Dummy
    listKind: DummyList
    plural: dummies
    singular: dummy
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgets.karpenter.extra.example.com
  labels:
    test.runwhen.com/fixture: extra-crd-groups
spec:
  group: karpenter.extra.example.com
  names:
    kind: Widget
    listKind: WidgetList
    plural: widgets
    singular: widget
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
