---
# A Karpenter-named Deployment whose pods cannot schedule (nodeSelector
# matches no node). readyReplicas stays below spec.replicas, tripping the
# "Deployment is not fully Ready" path.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-core-extra
  namespace: karpenter
  labels:
    app.kubernetes.io/name: karpenter
    test.runwhen.com/fixture: replica-gap
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter-core-extra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karpenter-core-extra
    spec:
      nodeSelector:
        runwhen.com/never-matches: "true"
      containers:
        - name: noop
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "sleep 3600"]
