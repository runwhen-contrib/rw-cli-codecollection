apiVersion: runwhen.com/v1
kind: GenerationRules
spec:
  platform: kubernetes
  generationRules:
    - resourceTypes:
        - service
      matchRules:
        # A Service qualifies as a LiteLLM proxy only if its name hints at
        # LiteLLM AND either
        #   (a) it exposes the LiteLLM default HTTP port (4000), OR
        #   (b) it advertises "litellm" as an explicit label value (for
        #       Helm-chart installs that set app.kubernetes.io/name=litellm).
        #
        # Subchart Services deployed alongside the proxy (redis=6379,
        # postgres=5432, pgadmin, pgbouncer, exporters, etc.) share the
        # "litellm" name prefix but never expose 4000 AND never carry a
        # label value equal to "litellm", so they are filtered out.
        #
        # Property paths here follow the convention used elsewhere in this
        # repo (see curl-http-ok/spec/tls/hosts) where paths are rooted at
        # the raw Kubernetes object, without a "resource/" prefix.
        - type: and
          matches:
            - type: pattern
              pattern: "litellm"
              properties: [name]
              mode: substring
            - type: or
              matches:
                - type: pattern
                  pattern: "4000"
                  properties: [spec/ports/port]
                  mode: exact
                - type: pattern
                  pattern: "litellm"
                  properties: [label-values]
                  mode: exact
                - type: pattern
                  pattern: "litellm-proxy"
                  properties: [label-values]
                  mode: exact
      slxs:
        - baseName: litellm-proxy-hc
          qualifiers: ["resource", "namespace", "cluster"]
          baseTemplateName: k8s-litellm-proxy-health
          levelOfDetail: basic
          outputItems:
            - type: slx
            - type: sli
            - type: runbook
              templateName: k8s-litellm-proxy-health-taskset.yaml
