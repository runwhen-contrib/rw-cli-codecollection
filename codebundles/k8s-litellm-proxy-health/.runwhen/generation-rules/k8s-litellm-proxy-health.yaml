apiVersion: runwhen.com/v1
kind: GenerationRules
spec:
  platform: kubernetes
  generationRules:
    - resourceTypes:
        - service
      matchRules:
        # A Service qualifies as a LiteLLM proxy only if its name hints at
        # LiteLLM AND it exposes the LiteLLM default HTTP port (4000).
        #
        # The port check is the strongest discriminator - subchart Services
        # deployed alongside the proxy (redis=6379, postgres=5432, pgadmin,
        # exporter, pgbouncer, etc.) share the "litellm" name prefix but
        # never expose 4000, so they are filtered out.
        - type: and
          matches:
            - type: pattern
              pattern: "litellm"
              properties: [name]
              mode: substring
            - type: pattern
              pattern: "^4000$"
              properties: ["resource/spec/ports/port"]
              mode: exact
      slxs:
        - baseName: litellm-proxy-hc
          qualifiers: ["resource", "namespace", "cluster"]
          baseTemplateName: k8s-litellm-proxy-health
          levelOfDetail: basic
          outputItems:
            - type: slx
            - type: sli
            - type: runbook
              templateName: k8s-litellm-proxy-health-taskset.yaml
