apiVersion: runwhen.com/v1
kind: ServiceLevelIndicator
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
    runwhen.com/sli: "true"
spec:
  displayUnitsLong: OK
  displayUnitsShort: ok
  locations:
    - {{default_location}}
  description: Aggregates LiteLLM liveness, readiness, and Kubernetes Service presence for {{match_resource.resource.metadata.name}}.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/k8s-litellm-proxy-health/sli.robot
  intervalStrategy: intermezzo
  intervalSeconds: 300
  configProvided:
    - name: CONTEXT
      value: "{{context}}"
    - name: NAMESPACE
      value: "{{match_resource.resource.metadata.namespace}}"
    - name: LITELLM_SERVICE_NAME
      value: "{{match_resource.resource.metadata.name}}"
    - name: PROXY_BASE_URL
      value: "http://{{match_resource.resource.metadata.name}}.{{match_resource.resource.metadata.namespace}}.svc.cluster.local:4000"
    - name: KUBERNETES_DISTRIBUTION_BINARY
      value: "{{custom.kubernetes_distribution_binary | default('kubectl')}}"
  secretsProvided:
  {% if wb_version %}
    {% include "kubernetes-auth.yaml" ignore missing %}
  {% else %}
    - name: kubeconfig
      workspaceKey: {{custom.kubeconfig_secret_name | default("kubeconfig")}}
  {% endif %}
  alertConfig:
    tasks:
      persona: eager-edgar
      sessionTTL: 10m
