apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/litellm.png
  alias: LiteLLM Proxy API Health for {{match_resource.resource.metadata.name}}
  asMeasuredBy: LiteLLM HTTP liveness and readiness endpoints plus Kubernetes Service presence.
  configProvided:
    - name: LITELLM_SERVICE_NAME
      value: {{match_resource.resource.metadata.name}}
  owners:
    - {{workspace.owner_email}}
  statement: The LiteLLM proxy Service should expose healthy liveness and readiness endpoints and have cluster networking configured.
  additionalContext:
    {% include "kubernetes-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "kubernetes-tags.yaml" ignore missing %}
    - name: access
      value: read-only
