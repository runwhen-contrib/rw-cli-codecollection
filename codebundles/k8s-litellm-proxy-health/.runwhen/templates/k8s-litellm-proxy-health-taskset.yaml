apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: LiteLLM proxy HTTP health checks and optional kubectl Service correlation for {{match_resource.resource.metadata.name}}.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/k8s-litellm-proxy-health/runbook.robot
  configProvided:
    - name: CONTEXT
      value: "{{context}}"
    - name: NAMESPACE
      value: "{{match_resource.resource.metadata.namespace}}"
    - name: LITELLM_SERVICE_NAME
      value: "{{match_resource.resource.metadata.name}}"
    - name: PROXY_BASE_URL
      value: "http://{{match_resource.resource.metadata.name}}.{{match_resource.resource.metadata.namespace}}.svc.cluster.local:4000"
    - name: LITELLM_HTTP_PORT
      value: "4000"
    - name: LITELLM_RUN_DEEP_HEALTH
      value: "false"
    - name: LITELLM_INTEGRATION_SERVICES
      value: ""
    - name: KUBERNETES_DISTRIBUTION_BINARY
      value: "{{custom.kubernetes_distribution_binary | default('kubectl')}}"
  secretsProvided:
  {% if wb_version %}
    {% include "kubernetes-auth.yaml" ignore missing %}
  {% else %}
    - name: kubeconfig
      workspaceKey: {{custom.kubeconfig_secret_name | default("kubeconfig")}}
    - name: litellm_master_key
      workspaceKey: {{custom.litellm_master_key_secret_name | default("litellm_master_key")}}
  {% endif %}
