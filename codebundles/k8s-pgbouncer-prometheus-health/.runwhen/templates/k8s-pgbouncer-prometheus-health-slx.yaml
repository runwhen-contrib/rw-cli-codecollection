apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/kubernetes/resources/labeled/service.svg
  alias: {{ match_resource.namespace }} Kubernetes PgBouncer Prometheus Health
  asMeasuredBy: PgBouncer pool saturation, waits, exporter availability, and capacity signals from Prometheus metrics.
  configProvided:
    - name: SLX_PLACEHOLDER
      value: SLX_PLACEHOLDER
  owners:
    - {{ workspace.owner_email }}
  statement: Monitor PgBouncer connection pools using prometheus-community/pgbouncer_exporter metrics with per-pod and fleet-level diagnostics.
  additionalContext:
    {% include "kubernetes-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "kubernetes-tags.yaml" ignore missing %}
    - name: platform
      value: kubernetes
    - name: resource
      value: pgbouncer
    - name: scope
      value: service
    - name: access
      value: read-only
