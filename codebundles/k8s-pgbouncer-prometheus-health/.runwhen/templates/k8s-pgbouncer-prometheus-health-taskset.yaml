apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: Evaluates PgBouncer health from Prometheus metrics for {{ match_resource.namespace }} including exporter availability, saturation, waits, pool balance, pool mode, hotspots, outliers, growth, and optional capacity SLI.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/k8s-pgbouncer-prometheus-health/runbook.robot
  configProvided:
    - name: CONTEXT
      value: "{{ match_resource.context }}"
    - name: PROMETHEUS_URL
      value: "{{ custom.prometheus_url | default('') }}"
    - name: METRIC_NAMESPACE_FILTER
      value: "{{ match_resource.namespace }}"
    - name: METRIC_NAMESPACE_LABEL
      value: "{{ custom.metric_namespace_label | default('kubernetes_namespace') }}"
    - name: PGBOUNCER_JOB_LABEL
      value: "{{ custom.pgbouncer_job_label | default('job=\"pgbouncer-exporter\"') }}"
    - name: CLIENT_SATURATION_PERCENT_THRESHOLD
      value: "{{ custom.client_saturation_percent_threshold | default('80') }}"
    - name: INCLUDE_WAITING_IN_SATURATION
      value: "{{ custom.include_waiting_in_saturation | default('true') }}"
    - name: CLIENT_WAITING_MIN_THRESHOLD
      value: "{{ custom.client_waiting_min_threshold | default('0') }}"
    - name: MAX_WAIT_SECONDS_THRESHOLD
      value: "{{ custom.max_wait_seconds_threshold | default('1') }}"
    - name: EXPECTED_POOL_MODE
      value: "{{ custom.expected_pool_mode | default('transaction') }}"
    - name: APP_REPLICAS
      value: "{{ custom.app_replicas | default('') }}"
    - name: APP_DB_POOL_SIZE
      value: "{{ custom.app_db_pool_size | default('') }}"
    - name: PGBOUNCER_REPLICAS
      value: "{{ custom.pgbouncer_replicas | default('') }}"
    - name: CONNECTION_GROWTH_LOOKBACK
      value: "{{ custom.connection_growth_lookback | default('15m') }}"
    - name: CONNECTION_GROWTH_DELTA_THRESHOLD
      value: "{{ custom.connection_growth_delta_threshold | default('8') }}"
    - name: POD_OUTLIER_RATIO
      value: "{{ custom.pod_outlier_ratio | default('1.4') }}"
    - name: METRIC_POD_LABEL
      value: "{{ custom.metric_pod_label | default('pod') }}"
    - name: DATABASE_DOMINANCE_RATIO
      value: "{{ custom.database_dominance_ratio | default('0.45') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "kubernetes-auth.yaml" ignore missing %}
  {% else %}
    - name: prometheus_bearer_token
      workspaceKey: AUTH DETAILS NOT FOUND
    - name: kubeconfig
      workspaceKey: AUTH DETAILS NOT FOUND
  {% endif %}
