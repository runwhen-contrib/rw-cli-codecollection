apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: PgBouncer Prometheus health checks for Service {{ match_resource.resource.metadata.name }} in namespace {{ match_resource.resource.metadata.namespace }} using metrics from prometheus-community/pgbouncer_exporter.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/k8s-pgbouncer-prometheus-health/runbook.robot
  configProvided:
    - name: CONTEXT
      value: "{{context}}"
    - name: METRIC_NAMESPACE_FILTER
      value: "{{ match_resource.resource.metadata.namespace }}"
    - name: PROMETHEUS_URL
      value: "{{ custom.prometheus_url | default('') }}"
    - name: PGBOUNCER_JOB_LABEL
      value: "{{ custom.pgbouncer_job_label | default('job=\"pgbouncer-exporter\"') }}"
    - name: EXPECTED_POOL_MODE
      value: "{{ custom.pgbouncer_expected_pool_mode | default('transaction') }}"
    - name: CLIENT_SATURATION_PERCENT_THRESHOLD
      value: "{{ custom.pgbouncer_client_saturation_percent | default('80') }}"
    - name: MAX_WAIT_SECONDS_THRESHOLD
      value: "{{ custom.pgbouncer_max_wait_seconds | default('1') }}"
    - name: APP_REPLICAS
      value: "{{ custom.pgbouncer_app_replicas | default('') }}"
    - name: APP_DB_POOL_SIZE
      value: "{{ custom.pgbouncer_app_db_pool_size | default('') }}"
    - name: PGBOUNCER_REPLICAS
      value: "{{ custom.pgbouncer_replicas | default('') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "kubernetes-auth.yaml" ignore missing %}
  {% else %}
    - name: kubeconfig
      workspaceKey: AUTH DETAILS NOT FOUND
  {% endif %}
    - name: prometheus_bearer_token
      workspaceKey: "{{ custom.prometheus_bearer_token_workspace_key | default('AUTH DETAILS NOT FOUND') }}"
