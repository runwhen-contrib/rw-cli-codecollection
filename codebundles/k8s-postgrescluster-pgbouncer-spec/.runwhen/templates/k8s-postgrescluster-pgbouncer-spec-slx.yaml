apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/CrunchyDataPrimaryIcon.png
  alias: {{ match_resource.resource.metadata.name }} PostgresCluster PgBouncer Spec
  asMeasuredBy: Declared PgBouncer proxy settings on the PostgresCluster match policy.
  configProvided:
    - name: POSTGRESCLUSTER_NAME
      value: '{{ match_resource.resource.metadata.name }}'
  owners:
    - {{ workspace.owner_email }}
  statement: PostgresCluster PgBouncer pool mode, limits, and replica count align with organizational policy.
  additionalContext:
    {% include "kubernetes-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "kubernetes-tags.yaml" ignore missing %}
    - name: access
      value: read-only
