apiVersion: runwhen.com/v1
kind: ServiceLevelIndicator
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  displayUnitsLong: Execution Status
  displayUnitsShort: exe
  locations:
    - {{default_location}}
  description: Periodically triggers k8s-statefulset-ops runbook for StatefulSet {{match_resource.resource.metadata.name}} in namespace {{match_resource.resource.metadata.namespace}}.
  codeBundle:
    repoUrl: https://github.com/runwhen-contrib/rw-workspace-utils.git
    ref: main
    pathToRobot: codebundles/cron-scheduler-sli/sli.robot
  intervalStrategy: intermezzo
  intervalSeconds: 300
  configProvided:
    - name: CRON_SCHEDULE
      value: "0 */6 * * *"
    - name: TARGET_SLX
      value: ""
    - name: DRY_RUN
      value: "false"
  secretsProvided: []
