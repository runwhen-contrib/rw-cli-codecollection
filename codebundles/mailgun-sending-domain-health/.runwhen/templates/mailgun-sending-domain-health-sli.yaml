apiVersion: runwhen.com/v1
kind: ServiceLevelIndicator
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  displayUnitsLong: Health Score
  displayUnitsShort: score
  locations:
    - {{default_location}}
  description: Aggregates Mailgun domain active state, delivery success vs threshold, and SPF alignment for {{ match_resource.name | default(custom.mailgun_sending_domain) }}.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/mailgun-sending-domain-health/sli.robot
  intervalStrategy: intermezzo
  intervalSeconds: 300
  configProvided:
    - name: MAILGUN_SENDING_DOMAIN
      value: "{{ match_resource.name | default(custom.mailgun_sending_domain) }}"
    - name: MAILGUN_API_REGION
      value: "{{ custom.mailgun_api_region | default('us') }}"
    - name: MAILGUN_STATS_WINDOW_HOURS
      value: "{{ custom.mailgun_stats_window_hours | default('24') }}"
    - name: MAILGUN_MIN_DELIVERY_SUCCESS_PCT
      value: "{{ custom.mailgun_min_delivery_success_pct | default('95') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "mailgun-auth.yaml" ignore missing %}
  {% else %}
    - name: mailgun_api_key
      workspaceKey: AUTH DETAILS NOT FOUND
  {% endif %}
  alertConfig:
    tasks:
      persona: eager-edgar
      sessionTTL: 10m
