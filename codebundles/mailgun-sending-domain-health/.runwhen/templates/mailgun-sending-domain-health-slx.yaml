apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/gcp/pubsub.svg
  alias: {{ match_resource.name | default(match_resource.resource_name) }} Mailgun Sending Domain Health
  asMeasuredBy: Mailgun API domain state, delivery stats, and DNS alignment for the sending domain.
  configProvided:
    - name: SLX_PLACEHOLDER
      value: SLX_PLACEHOLDER
  owners:
    - {{ workspace.owner_email }}
  statement: Monitor Mailgun sending domain verification, delivery metrics, and DNS health for email delivery reliability.
  additionalContext:
    {% include "mailgun-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name | default(match_resource.name) }}"
  tags:
    {% include "mailgun-tags.yaml" ignore missing %}
    - name: cloud
      value: saas
    - name: service
      value: mailgun
    - name: scope
      value: domain
    - name: access
      value: read-only
