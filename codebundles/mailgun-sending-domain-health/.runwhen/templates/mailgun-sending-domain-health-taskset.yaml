apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{default_location}}
  description: Mailgun sending domain health for {{ match_resource.name | default(custom.mailgun_sending_domain) }} (region {{ custom.mailgun_api_region | default("us") }}).
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/mailgun-sending-domain-health/runbook.robot
  configProvided:
    - name: MAILGUN_SENDING_DOMAIN
      value: "{{ match_resource.name | default(custom.mailgun_sending_domain) }}"
    - name: MAILGUN_API_REGION
      value: "{{ custom.mailgun_api_region | default('us') }}"
    - name: RESOURCES
      value: "{{ custom.mailgun_resources | default('All') }}"
    - name: MAILGUN_STATS_WINDOW_HOURS
      value: "{{ custom.mailgun_stats_window_hours | default('24') }}"
    - name: MAILGUN_MIN_DELIVERY_SUCCESS_PCT
      value: "{{ custom.mailgun_min_delivery_success_pct | default('95') }}"
    - name: MAILGUN_MAX_BOUNCE_RATE_PCT
      value: "{{ custom.mailgun_max_bounce_rate_pct | default('5') }}"
    - name: MAILGUN_MAX_COMPLAINT_RATE_PCT
      value: "{{ custom.mailgun_max_complaint_rate_pct | default('0.1') }}"
    - name: MAILGUN_VERIFY_MX
      value: "{{ custom.mailgun_verify_mx | default('false') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "mailgun-auth.yaml" ignore missing %}
  {% else %}
    - name: mailgun_api_key
      workspaceKey: AUTH DETAILS NOT FOUND
  {% endif %}
