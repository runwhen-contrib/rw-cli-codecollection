apiVersion: runwhen.com/v1
kind: ServiceLevelIndicator
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  displayUnitsLong: Health Score
  displayUnitsShort: score
  locations:
    - {{default_location}}
  description: Measures OpenRouter account spend health across API reachability, balance sufficiency, budget adherence, anomaly absence, and model concentration risk.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{repo_url}}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ref}}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/openrouter-spend-health/sli.robot
  intervalStrategy: intermezzo
  intervalSeconds: 300
  configProvided:
    - name: OPENROUTER_API_KEY_LABEL
      value: "{{ match_resource.resource_name }}"
    - name: OPENROUTER_LOOKBACK_DAYS
      value: "{{ custom.openrouter_lookback_days | default('7') }}"
    - name: OPENROUTER_BUDGET_USD
      value: "{{ custom.openrouter_budget_usd | default('0') }}"
    - name: OPENROUTER_MIN_BALANCE_USD
      value: "{{ custom.openrouter_min_balance_usd | default('10') }}"
    - name: OPENROUTER_SPEND_CONCENTRATION_THRESHOLD
      value: "{{ custom.openrouter_spend_concentration_threshold | default('50') }}"
    - name: OPENROUTER_ANOMALY_STDDEV_THRESHOLD
      value: "{{ custom.openrouter_anomaly_stddev_threshold | default('2') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "openrouter-auth.yaml" ignore missing %}
  {% else %}
    - name: openrouter_api_key
      workspaceKey: {{ custom.openrouter_api_key_secret_name | default("openrouter_api_key") }}
  {% endif %}
  alertConfig:
    tasks:
      persona: eager-edgar
      sessionTTL: 10m