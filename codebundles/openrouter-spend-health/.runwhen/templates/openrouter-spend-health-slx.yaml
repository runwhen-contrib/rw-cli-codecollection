apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{slx_name}}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/openrouter/openrouter.svg
  alias: {{ match_resource.resource_name }} OpenRouter Spend Health
  asMeasuredBy: Composite spend health score based on API reachability, balance sufficiency, budget adherence, anomaly absence, and model concentration risk.
  configProvided:
  - name: SLX_PLACEHOLDER
    value: SLX_PLACEHOLDER
  owners:
  - {{workspace.owner_email}}
  statement: OpenRouter accounts should maintain sufficient balance, stay within budget, avoid spend concentration and anomalies, and have complete spend logs.
  additionalContext:
    {% include "openrouter-hierarchy.yaml" ignore missing %}
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    {% include "openrouter-tags.yaml" ignore missing %}
    - name: service
      value: openrouter
    - name: access
      value: read-only
    - name: scope
      value: account