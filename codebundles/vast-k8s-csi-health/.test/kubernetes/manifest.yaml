apiVersion: v1
kind: Namespace
metadata:
  name: test-vast-csi-health
  labels:
    app.kubernetes.io/part-of: vast-k8s-csi-health-test

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: vast-test-sc
provisioner: csi.vastdata.com
parameters:
  endpoint: "192.0.2.10"
  view_policy: "default"
  tenant: "test-tenant"
reclaimPolicy: Delete
volumeBindingMode: Immediate

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-vast-pvc
  namespace: test-vast-csi-health
  annotations:
    volume.kubernetes.io/storage-provisioner: csi.vastdata.com
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: vast-test-sc
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-vast-consumer
  namespace: test-vast-csi-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-vast-consumer
  template:
    metadata:
      labels:
        app: test-vast-consumer
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["/bin/sh", "-c", "while true; do sleep 30; done"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: test-vast-pvc
