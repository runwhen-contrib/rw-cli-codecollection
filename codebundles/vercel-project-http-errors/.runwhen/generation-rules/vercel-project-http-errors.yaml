apiVersion: runwhen.com/v1
kind: GenerationRules
spec:
  platform: vercel
  generationRules:
    - resourceTypes:
        - vercel_project
      matchRules:
        - type: pattern
          pattern: ".+"
          properties: ["name"]
          mode: substring
      slxs:
        - baseName: vercel-project-http-errors
          qualifiers: ["resource"]
          baseTemplateName: vercel-project-http-errors
          levelOfDetail: basic
          outputItems:
            - type: slx
            - type: sli
            - type: runbook
              templateName: vercel-project-http-errors-taskset.yaml
