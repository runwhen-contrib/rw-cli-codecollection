apiVersion: runwhen.com/v1
kind: ServiceLevelIndicator
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  displayUnitsLong: Health Score
  displayUnitsShort: score
  locations:
    - {{ default_location }}
  description: Scores Vercel project API reachability and a capped runtime HTTP error sample for {{ match_resource.name }}.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{ repo_url }}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ ref }}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/vercel-project-http-errors/sli.robot
  intervalStrategy: intermezzo
  intervalSeconds: 300
  configProvided:
    - name: VERCEL_TEAM_ID
      value: "{{ match_resource.resource.team_id | default('') }}"
    - name: VERCEL_PROJECT_ID
      value: "{{ match_resource.resource.project_id | default(match_resource.name) }}"
    - name: TIME_WINDOW_HOURS
      value: "{{ custom.vercel_time_window_hours | default('24') }}"
    - name: DEPLOYMENT_ENVIRONMENT
      value: "{{ custom.vercel_deployment_environment | default('production') }}"
    - name: MAX_DEPLOYMENTS_TO_SCAN
      value: "{{ custom.vercel_max_deployments | default('10') }}"
    - name: SLI_LOG_LINE_CAP
      value: "{{ custom.vercel_sli_log_line_cap | default('800') }}"
    - name: SLI_MAX_ERROR_EVENTS
      value: "{{ custom.vercel_sli_max_error_events | default('25') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "vercel-auth.yaml" ignore missing %}
  {% else %}
    - name: vercel_token
      workspaceKey: AUTH DETAILS NOT FOUND
  {% endif %}
  alertConfig:
    tasks:
      persona: eager-edgar
      sessionTTL: 10m
