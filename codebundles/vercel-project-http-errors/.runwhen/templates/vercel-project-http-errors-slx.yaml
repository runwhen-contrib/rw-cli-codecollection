apiVersion: runwhen.com/v1
kind: ServiceLevelX
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  imageURL: https://storage.googleapis.com/runwhen-nonprod-shared-images/icons/kubernetes/resources/labeled/deploy.svg
  alias: {{ match_resource.name }} Vercel HTTP Errors
  asMeasuredBy: Vercel runtime logs aggregated for HTTP 404, 5xx, and configured client errors by route.
  configProvided:
    - name: VERCEL_PROJECT_ID
      value: "{{ match_resource.resource.project_id | default(match_resource.name) }}"
  owners:
    - {{ workspace.owner_email }}
  statement: Vercel-served routes should not show elevated HTTP errors in runtime logs for the configured lookback.
  additionalContext:
    qualified_name: "{{ match_resource.qualified_name }}"
  tags:
    - name: cloud
      value: vercel
    - name: service
      value: vercel-project
    - name: scope
      value: project
    - name: access
      value: read-only
