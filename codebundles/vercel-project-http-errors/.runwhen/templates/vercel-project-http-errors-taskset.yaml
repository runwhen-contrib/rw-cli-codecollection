apiVersion: runwhen.com/v1
kind: Runbook
metadata:
  name: {{ slx_name }}
  labels:
    {% include "common-labels.yaml" %}
  annotations:
    {% include "common-annotations.yaml" %}
spec:
  location: {{ default_location }}
  description: Aggregates Vercel runtime HTTP errors (404, 5xx, optional codes) by route for project {{ match_resource.name }}.
  codeBundle:
    {% if repo_url %}
    repoUrl: {{ repo_url }}
    {% else %}
    repoUrl: https://github.com/runwhen-contrib/rw-cli-codecollection.git
    {% endif %}
    {% if ref %}
    ref: {{ ref }}
    {% else %}
    ref: main
    {% endif %}
    pathToRobot: codebundles/vercel-project-http-errors/runbook.robot
  configProvided:
    - name: VERCEL_TEAM_ID
      value: "{{ match_resource.resource.team_id | default('') }}"
    - name: VERCEL_PROJECT_ID
      value: "{{ match_resource.resource.project_id | default(match_resource.name) }}"
    - name: TIME_WINDOW_HOURS
      value: "{{ custom.vercel_time_window_hours | default('24') }}"
    - name: DEPLOYMENT_ENVIRONMENT
      value: "{{ custom.vercel_deployment_environment | default('production') }}"
    - name: UNHEALTHY_HTTP_CODES
      value: "{{ custom.vercel_unhealthy_http_codes | default('408,429') }}"
    - name: MIN_REQUEST_COUNT_THRESHOLD
      value: "{{ custom.vercel_min_request_threshold | default('5') }}"
    - name: MAX_DEPLOYMENTS_TO_SCAN
      value: "{{ custom.vercel_max_deployments | default('10') }}"
    - name: RUNTIME_LOG_MAX_LINES_PER_DEPLOYMENT
      value: "{{ custom.vercel_runtime_log_line_cap | default('10000') }}"
  secretsProvided:
  {% if wb_version %}
    {% include "vercel-auth.yaml" ignore missing %}
  {% else %}
    - name: vercel_token
      workspaceKey: AUTH DETAILS NOT FOUND
  {% endif %}
